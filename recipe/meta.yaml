{% set name = "curlify" %}
{% set version = "3.0.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/curlify-{{ version }}.tar.gz
  sha256: 7b488ff3c924dba3433a1cc74044c0942da21f0a97fa26c3138319ba640ca412

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python
  run:
    - python
    - requests

test:
  imports:
    - curlify
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/oeegor/curlify
  summary: Library to convert python requests object to curl command.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kcemenike
